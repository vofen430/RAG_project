server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:rag_local}
    username: ${DB_USERNAME:rag_user}
    password: ${DB_PASSWORD:rag_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.rag.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-value: 1
      logic-not-delete-value: 0

siliconflow:
  api-key: ${MODEL_PROVIDER_API_KEY:your-api-key-here}
  base-url: https://api.siliconflow.com/v1

rag:
  chunk-size: 500
  chunk-overlap: 100
  top-k: 10
  top-n: 5
  embedding-dimensions: 1024

app:
  jwt:
    secret: ${JWT_SECRET:replace-with-local-secret-key-at-least-32-chars-long}
    expiration-seconds: 7200
  storage:
    root: ${LOCAL_STORAGE_ROOT:./storage}
    documents-dir: documents
    tmp-dir: tmp
    exports-dir: exports
    logs-dir: logs

logging:
  level:
    com.rag: DEBUG
    org.springframework.security: INFO
    com.baomidou.mybatisplus: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
